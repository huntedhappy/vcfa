layout:
  pages:
    - id: page_general
      sections:
        - id: 1. Environment (환경 설정)
          fields:
            - id: projects
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: namespace
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 2. Cluster (클러스터)
          fields:
            - id: guestcluster
              display: textField
              state:
                visible: true
                read-only: false
        - id: 3. Storage (스토리지)
          fields:
            - id: storageclass
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 4. Kubernetes (쿠버네티스)
          fields:
            - id: kr_version
              display: dropDown
              state:
                visible: true
                read-only: false
      title: 1. 기본 설정
    - id: page_nodes
      sections:
        - id: 5. Common (공통)
          fields:
            - id: default_disk_size
              display: integerField
              state:
                visible: true
                read-only: false
        - id: 6. Master Node (마스터 노드)
          fields:
            - id: master_count
              display: integerField
              state:
                visible: true
                read-only: false
            - id: vmclass_con
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: master_disk_size
              display: integerField
              state:
                visible: true
                read-only: false
        - id: 7. Worker NodePools (워커 노드풀)
          fields:
            - id: enable_second_nodepool
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: worker_count
              display: integerField
              state:
                visible: true
                read-only: false
            - id: vmclass_worker
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: worker_disk_size
              display: integerField
              state:
                visible: true
                read-only: false
            - id: worker_count2
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      enable_second_nodepool: true
                    value: true
            - id: vmclass_worker2
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      enable_second_nodepool: true
                    value: true
            - id: worker_disk_size2
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      enable_second_nodepool: true
                    value: true
      title: 2. 노드 구성
    - id: page_os
      sections:
        - id: 8. OS / Image (OS·이미지)
          fields:
            - id: contents_library
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: os
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: ubuntu_version
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      os: ubuntu
                    value: true
        - id: 9. NTP / SSH
          fields:
            - id: ntpserver
              display: textField
              state:
                visible: true
                read-only: false
            - id: ssh_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: ssh_public_key
              display: textField
              state:
                read-only: false
                visible:
                  - equals:
                      ssh_enabled: true
                    value: true
      title: 3. OS / 네트워크
    - id: page_security
      sections:
        - id: 10. Trust CA (신뢰 인증서)
          fields:
            - id: trust_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: trust_ca
              display: textArea
              state:
                read-only: false
                visible:
                  - equals:
                      trust_enabled: true
                    value: true
            - id: trust_base64
              display: textField
              state:
                visible: false
                read-only: false
        - id: 11. Security (보안)
          fields:
            - id: banner
              display: textArea
              state:
                visible: true
                read-only: false
            - id: fips_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
      title: 4. 보안 설정
schema:
  projects:
    label: Project Name
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getProjectsNames
      type: dynamic
      parameters: []
    constraints:
      required: true
  namespace:
    label: Namespce Name
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getNamespaces
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
      isPageable: false
    constraints:
      required: true
  ssh_public_key:
    label: SSH Public Key
    type:
      dataType: string
      isMultiple: false
    default: ' '
    placeholder: SSH Public Key를 등록 하세요
    constraints:
      required: false
  storageclass:
    label: vSAN Storage Class
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getStorageClass
      type: dynamic
      parameters: []
    placeholder: Storage Policy를 선택하세요
    constraints:
      required: true
  guestcluster:
    label: Guest Cluster Name
    type:
      dataType: string
      isMultiple: false
    placeholder: GuestCluster의 이름을 작성하세요
    constraints:
      required: true
  ntpserver:
    label: NTP Servers
    description: '쉼표(,)로 여러 개 입력 (예: 10.253.100.2,10.253.100.3)'
    signpost: '쉼표(,)로 여러 개 입력 (예: 10.253.100.2,10.253.100.3)'
    type:
      dataType: string
      isMultiple: false
    placeholder: NTP 서버 IP를 입력 하세요
    constraints:
      required: true
  vmclass_con:
    label: VMclass Master Size
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClass
      type: dynamic
      parameters: []
    placeholder: CPU | Memory 사이즈를 선택 하세요
  vmclass_worker:
    label: VMclass Worker NodePool 1 Size
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClass
      type: dynamic
      parameters: []
  vmclass_worker2:
    label: VMclass Worker NodePool 2 Size
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClass
      type: dynamic
      parameters: []
  default_disk_size:
    label: Default Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 100
  master_count:
    label: Master Node Count
    type:
      dataType: integer
      isMultiple: false
    default: 1
  master_disk_size:
    label: Master Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 100
  worker_count:
    label: Worker NodePool 1 Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
  worker_count2:
    label: Worker NodePool 2 Count
    type:
      dataType: integer
      isMultiple: false
    default: 3
  worker_disk_size:
    label: Worker NodePool 1 Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 200
  worker_disk_size2:
    label: Worker NodePool 2 Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 200
  enable_second_nodepool:
    label: Enable Worker NodePool 2
    type:
      dataType: boolean
      isMultiple: false
    default: false
  ssh_enabled:
    label: SSH Public Enabled
    type:
      dataType: boolean
      isMultiple: false
  contents_library:
    label: Contents Library
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getContentsLibrary
      type: dynamic
      parameters: []
    placeholder: Content Library를 선택 하세요
  os:
    label: Ubuntu || Photon || Windows
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getOS
      type: dynamic
      parameters: []
    placeholder: OS를 선택하세요
    constraints:
      required: true
  ubuntu_version:
    label: Ubuntu Version 24.04 || 22.04
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getUbuntuVersion
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          os: os
      isPageable: false
    placeholder: 버전을 선택하세요
    constraints:
      required: true
  trust_enabled:
    label: Trust CA Enabled
    type:
      dataType: boolean
      isMultiple: false
    default: false
  trust_ca:
    label: Trust CA Additional
    type:
      dataType: string
      isMultiple: false
    default: ''
    placeholder: 신뢰 하는 인증서를 등록 하세요
    constraints:
      required: true
  trust_base64:
    label: Trust CA Base64
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/doubleBase64
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          TrustCA: trust_ca
      isPageable: false
    constraints:
      required: false
  kr_version:
    label: KR Version
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getKRVersion
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    placeholder: 설치할 Kubernets Version을 선택 하세요
  banner:
    label: SSH Banner
    type:
      dataType: string
      isMultiple: false
    default: >-
      This is a test banner for FIPS mode. # Customer may opt-in setting a
      banner other than the default Federal FIPS banner when FIPS mode is
      enabled.
    placeholder: SSH 접속 배너를 입력 하세요
    constraints:
      required: false
  fips_enabled:
    label: FIPS Enabled
    type:
      dataType: boolean
      isMultiple: false
    default: false
    constraints:
      required: false
options:
  externalValidations: []
