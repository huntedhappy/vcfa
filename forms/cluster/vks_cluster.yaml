layout:
  pages:
    - id: page_common
      sections:
        - id: 1. Environment (환경)
          fields:
            - id: projects
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: namespace
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 2. Cluster (클러스터)
          fields:
            - id: guestcluster
              display: textField
              state:
                visible: true
                read-only: false
            - id: cluster_class
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: kr_version
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 3. Compute (공통 기본값)
          fields:
            - id: common_vmclass
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: common_os_image
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: common_selector
              display: textField
              state:
                visible: false
                read-only: true
        - id: 4. Storage (스토리지)
          fields:
            - id: storageclass
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: default_disk_size
              display: integerField
              state:
                visible: true
                read-only: false
        - id: 5. NTP / SSH
          fields:
            - id: ntpserver
              display: textField
              state:
                visible: true
                read-only: false
            - id: ssh_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: ssh_public_key
              display: textField
              state:
                read-only: false
                visible:
                  - equals:
                      ssh_enabled: true
                    value: true
        - id: 6. Security (보안·신뢰)
          fields:
            - id: trust_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: trust_ca
              display: textArea
              state:
                read-only: false
                visible:
                  - equals:
                      trust_enabled: true
                    value: true
            - id: trust_base64
              display: textField
              state:
                visible: false
                read-only: false
            - id: banner
              display: textArea
              state:
                visible: true
                read-only: false
            - id: fips_enabled
              display: checkbox
              state:
                visible: true
                read-only: false
      title: Common
    - id: page_controlplane
      sections:
        - id: 7. Control Plane (마스터 노드)
          fields:
            - id: master_count
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: cp_override
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: vmclass_con
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      cp_override: true
                    value: true
            - id: master_disk_size
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      cp_override: true
                    value: true
            - id: os_image_cp
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      cp_override: true
                    value: true
            - id: cp_selector
              display: textField
              state:
                visible: false
                read-only: true
      title: Control Plane
    - id: page_nodepools
      sections:
        - id: 8. Node Pools (워커 노드풀)
          fields:
            - id: worker_count
              display: integerField
              state:
                visible: true
                read-only: false
            - id: worker_override
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: vmclass_worker
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      worker_override: true
                    value: true
            - id: worker_disk_size
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      worker_override: true
                    value: true
            - id: os_image_worker
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      worker_override: true
                    value: true
            - id: worker_selector
              display: textField
              state:
                visible: false
                read-only: true
            - id: enable_second_nodepool
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: worker_count2
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      enable_second_nodepool: true
                    value: true
            - id: vmclass_worker2
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      worker_override: true
                    value: true
            - id: worker_disk_size2
              display: integerField
              state:
                read-only: false
                visible:
                  - equals:
                      worker_override: true
                    value: true
      title: Node Pools
schema:
  projects:
    label: VCFA Project
    description: 'Supervisor Project — namespace/vmclass/storage 동적 조회의 기준. (카탈로그 상단 Project 와 같은 값)'
    signpost: 'Supervisor Project. 이 값으로 namespace/vmclass/storage 를 동적 조회합니다.'
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getProjectsNames
      type: dynamic
      parameters: []
    constraints:
      required: true
  namespace:
    label: Namespace Name
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getNamespaces
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
      isPageable: false
    constraints:
      required: true
  ssh_public_key:
    label: SSH Public Key
    type:
      dataType: string
      isMultiple: false
    default: ''
    placeholder: SSH Public Key를 등록 하세요
    constraints:
      required: false
  storageclass:
    label: vSAN Storage Class
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getStorageClass
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    placeholder: Storage Policy를 선택하세요
    constraints:
      required: true
  guestcluster:
    label: Guest Cluster Name
    type:
      dataType: string
      isMultiple: false
    placeholder: GuestCluster의 이름을 작성하세요
    constraints:
      required: true
  cluster_class:
    label: Cluster Class
    description: '클러스터클래스(builtin-generic-vX.Y.Z) 동적 조회 — 새 버전 자동 노출(하드코딩 아님).'
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getClusterClass
      type: dynamic
      parameters: []
    placeholder: 클러스터클래스 버전을 선택하세요
    constraints:
      required: true
  ntpserver:
    label: NTP Servers
    description: '쉼표(,)로 여러 개 입력 (예: 10.253.100.2,10.253.100.3)'
    signpost: '쉼표(,)로 여러 개 입력 (예: 10.253.100.2,10.253.100.3)'
    type:
      dataType: string
      isMultiple: false
    placeholder: NTP 서버 IP를 입력 하세요
    constraints:
      required: true
  common_vmclass:
    label: VM Class (공통)
    description: '모든 노드 기본 VM Class. CP/NodePool 에서 Override 안 하면 이 값 사용.'
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClass
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    placeholder: CPU | Memory 사이즈를 선택 하세요
    constraints:
      required: true
  cp_override:
    label: Control Plane — Override Common (공통과 다르게)
    description: '체크하면 Control Plane 에 공통과 다른 VM Class/OS Image/Disk 를 지정. 해제하면 공통값 사용.'
    type:
      dataType: boolean
      isMultiple: false
    default: false
  worker_override:
    label: Worker NodePool — Override Common (공통과 다르게)
    description: '체크하면 Worker NodePool 에 공통과 다른 VM Class/OS Image/Disk 를 지정. 해제하면 공통값 사용.'
    type:
      dataType: boolean
      isMultiple: false
    default: false
  vmclass_con:
    label: VMclass Master Size (override, 비우면 공통)
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClassOptional
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    placeholder: CPU | Memory 사이즈를 선택 하세요
    constraints:
      required: false
  vmclass_worker:
    label: VMclass Worker NodePool 1 Size (override, 비우면 공통)
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClassOptional
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    constraints:
      required: false
  vmclass_worker2:
    label: VMclass Worker NodePool 2 Size (비우면 NodePool 2 미사용)
    description: 'NodePool 2 활성화 시에만 사용. 비활성화면 비워두세요(비움 옵션).'
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClassOptional
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    constraints:
      required: false
  default_disk_size:
    label: Default Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 100
  master_count:
    label: Master Node Count
    description: 'etcd 쿼럼을 위해 1(단일) 또는 3(HA)만 선택. 2/4 같은 짝수는 쿼럼 불가.'
    type:
      dataType: integer
      isMultiple: false
    default: 1
    oneOf:
      - title: '1 (단일 — 비프로덕션/테스트)'
        const: 1
      - title: '3 (HA — etcd 쿼럼)'
        const: 3
  master_disk_size:
    label: Master Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 100
  worker_count:
    label: Worker NodePool 1 Count
    type:
      dataType: integer
      isMultiple: false
    default: 2
  worker_count2:
    label: Worker NodePool 2 Count
    type:
      dataType: integer
      isMultiple: false
    default: 3
  worker_disk_size:
    label: Worker NodePool 1 Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 200
  worker_disk_size2:
    label: Worker NodePool 2 Disk Size
    type:
      dataType: integer
      isMultiple: false
    default: 200
  enable_second_nodepool:
    label: Enable Worker NodePool 2
    type:
      dataType: boolean
      isMultiple: false
    default: false
  ssh_enabled:
    label: SSH Public Enabled
    type:
      dataType: boolean
      isMultiple: false
    default: false
  common_os_image:
    label: OS Image (공통)
    description: 모든 노드 기본 OS Image. KR Version 을 먼저 선택하세요(windows 제외). Override 안 하면 이 값 사용.
    signpost: 모든 노드 기본 OS Image. KR Version 을 먼저 선택하세요(windows 제외).
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getOSImageByKR
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`controlplane`'
      isPageable: false
    placeholder: KR Version 선택 후 OS 이미지를 고르세요
    constraints:
      required: true
  os_image_cp:
    label: Control Plane OS Image (override, 비우면 공통)
    description: Control Plane override 시에만. 비우면 공통 OS Image 사용(windows 제외).
    signpost: Control Plane override 시에만. 비우면 공통 OS Image 사용.
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getOSImageByKR
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`controlplane`'
      isPageable: false
    placeholder: KR Version 선택 후 OS 이미지를 고르세요
    constraints:
      required: false
  os_image_worker:
    label: Worker OS Image (override, 비우면 공통)
    description: Worker override 시에만. 비우면 공통 OS Image 사용(worker 전용이라 windows 포함).
    signpost: Worker override 시에만. 비우면 공통 OS Image 사용.
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getOSImageByKR
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`worker`'
      isPageable: false
    placeholder: KR Version 선택 후 OS 이미지를 고르세요
    constraints:
      required: false
  common_selector:
    label: (internal) Common OS Image Selector
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/getOSSelector
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          osImage: common_os_image
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`controlplane`'
      isPageable: false
    constraints:
      required: false
  cp_selector:
    label: (internal) CP OS Image Selector
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/getOSSelector
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          osImage: os_image_cp
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`controlplane`'
      isPageable: false
    constraints:
      required: false
  worker_selector:
    label: (internal) Worker OS Image Selector
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/getOSSelector
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          osImage: os_image_worker
        - $type:
            dataType: string
            isMultiple: false
          krVersion: kr_version
        - $type:
            dataType: string
            isMultiple: false
          role: '`worker`'
      isPageable: false
    constraints:
      required: false
  trust_enabled:
    label: Trust CA Enabled
    type:
      dataType: boolean
      isMultiple: false
    default: false
  trust_ca:
    label: Trust CA Additional
    type:
      dataType: string
      isMultiple: false
    default: ''
    placeholder: 신뢰 하는 인증서를 등록 하세요
    constraints:
      required: true
  trust_base64:
    label: Trust CA Base64
    description: '트러스트 CA 는 double base64 필요(VKS 가 두 번 디코드). trustCaB64 액션 사용 — doubleBase64(single) 쓰면 클러스터가 노드 생성 못 함.'
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/trustCaB64
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          TrustCA: trust_ca
      isPageable: false
    constraints:
      required: false
  kr_version:
    label: KR Version
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getKRVersion
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    placeholder: 설치할 Kubernetes Version을 선택 하세요
  banner:
    label: SSH Banner
    type:
      dataType: string
      isMultiple: false
    default: >-
      This is a test banner for FIPS mode. # Customer may opt-in setting a
      banner other than the default Federal FIPS banner when FIPS mode is
      enabled.
    placeholder: SSH 접속 배너를 입력 하세요
    constraints:
      required: false
  fips_enabled:
    label: FIPS Enabled
    type:
      dataType: boolean
      isMultiple: false
    default: false
    constraints:
      required: false
options:
  externalValidations: []
