layout:
  pages:
    - id: page_general
      sections:
        - id: 1. Environment (환경 설정)
          fields:
            - id: projects
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: namespace
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 2. Compute Spec (컴퓨팅 사양)
          fields:
            - id: vmclass
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: vmCount
              display: integerField
              state:
                visible: false
                read-only: true
            - id: image
              display: dropDown
              state:
                visible: true
                read-only: false
        - id: 3. Network Settings (네트워크 설정)
          fields:
            - id: hostname
              display: textField
              state:
                visible: true
                read-only: false
            - id: domainname
              display: textField
              state:
                visible: true
                read-only: false
            - id: dnsservers
              display: textField
              state:
                visible: true
                read-only: false
            - id: searchdomains
              display: textField
              state:
                visible: true
                read-only: false
      title: General
    - id: page_storage
      sections:
        - id: 4. Storage Settings (공통)
          fields:
            - id: storageclass
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: enableOsDiskResize
              display: checkbox
              state:
                visible: true
                read-only: false
            - id: osDiskSize
              display: textField
              state:
                visible:
                  - equals:
                      enableOsDiskResize: true
                    value: true
                  - equals:
                      enableOsDiskResize: false
                    value: false
                read-only: false
            - id: dataDiskCount
              display: dropDown
              state:
                visible: true
                read-only: false
            - id: useCommonDataStorageclass
