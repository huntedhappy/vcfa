                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
        - id: 4-1. Data Disk 1
