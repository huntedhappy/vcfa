                      enableHttps: true
                    value: true
            - id: httpsVipType
              display: dropDown
              state:
                read-only: false
                visible:
                  - equals:
                      enableHttps: true
                    value: true
            - id: httpsCert
              display: textArea
              state:
                read-only: false
                visible:
                  - equals:
                      enableHttps: true
                    value: true
            - id: httpsKey
              display: textArea
              state:
                read-only: false
                visible:
                  - equals:
                      enableHttps: true
                    value: true
            - id: httpsCertB64
              display: textField
              state:
                visible: false
                read-only: true
            - id: httpsKeyB64
              display: textField
              state:
                visible: false
                read-only: true
      title: L4/L7
schema:
  projects:
    label: VCFA Project
    description: 'Supervisor Project — namespace/vmclass/storageclass 동적 조회의 기준. (카탈로그 상단 Project 와 같은 값)'
    signpost: 'Supervisor Project. 이 값으로 namespace/vmclass/storage 를 동적 조회합니다.'
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getProjectsNames
      type: dynamic
      parameters: []
    constraints:
      required: true
  namespace:
    label: Namespace Name
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getNamespaces
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
      isPageable: false
    constraints:
      required: true
  hostname:
    label: Guest Hostname
    description: '게스트 OS hostname과 리소스 이름 prefix로 함께 사용됩니다. 예: webvm'
    signpost: '게스트 OS hostname과 리소스 이름 prefix로 함께 사용됩니다. 예: webvm'
    type:
      dataType: string
      isMultiple: false
    default: webvm
  domainname:
    label: Domain Name
    description: 'VM 자신의 DNS 도메인 접미사. Guest Hostname 과 합쳐 FQDN 이 됩니다 (예: webvm + dtvcf.lab → webvm.dtvcf.lab). VM 의 network.domainName 으로 설정 — 보통 사내 도메인.'
    signpost: 'VM 자신의 도메인 접미사. Hostname 과 합쳐 FQDN (예: webvm + dtvcf.lab → webvm.dtvcf.lab).'
    type:
      dataType: string
      isMultiple: false
    default: dtvcf.lab
  dnsservers:
    label: DNS Servers
    description: 'VM 이 이름 해석에 사용할 DNS 서버(nameserver) IP — resolv.conf 의 nameserver. 쉼표(,)로 여러 개. 예: 10.253.100.2,10.253.100.3'
    signpost: 'VM 이 쓸 DNS 서버(nameserver) IP. 쉼표로 여러 개. 예: 10.253.100.2'
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
  searchdomains:
    label: Search Domains
    description: '짧은 이름 해석 시 자동으로 붙일 도메인 목록 — resolv.conf 의 search. 예: dtvcf.lab 면 ''webvm'' 조회를 ''webvm.dtvcf.lab'' 로 시도. (Domain Name=VM 자기 도메인 / Search=해석용 검색목록). 쉼표(,)로 여러 개.'
    signpost: '짧은 이름 해석용 검색 도메인(resolv.conf search). 예: dtvcf.lab → ''webvm'' 을 ''webvm.dtvcf.lab'' 로 시도.'
    type:
      dataType: string
      isMultiple: false
    constraints:
      required: true
  enableSshPublicKey:
    label: Enable SSH Public Key
    description: true면 SSH Public Key 입력 필드를 사용합니다.
    signpost: true면 SSH Public Key 입력 필드를 사용합니다.
    type:
      dataType: boolean
      isMultiple: false
    default: false
  ssh_public_key:
    label: SSH Public Key
    description: 선택 입력입니다. Enable SSH Public Key=true일 때만 적용됩니다.
    signpost: 선택 입력입니다. Enable SSH Public Key=true일 때만 적용됩니다.
    type:
      dataType: string
      isMultiple: false
    default: ''
    constraints:
      required: false
  adminUser:
    label: OS Admin User
    description: 접속할 OS 사용자 계정 이름. 기존 계정이면 비밀번호만 갱신되고, 없으면 생성됩니다.
    signpost: 접속할 OS 사용자 계정 이름. 기존 계정이면 비밀번호만 갱신되고, 없으면 생성됩니다.
    type:
      dataType: string
      isMultiple: false
    default:
      id: /data/vro-actions/com.vmk.dk/getAdminUserByImage
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          imageName: image
      isPageable: false
  adminPassword:
    label: OS Password
    description: '평문 비밀번호 입력 가능. 예: P@assW0rd'
    signpost: '평문 비밀번호 입력 가능. 예: P@assW0rd'
    type:
      dataType: secureString
      isMultiple: false
    constraints:
      required: true
  vmclass:
    label: VM Class
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMClass
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
  vmCount:
    label: VM 개수 (단일 VM 전용)
    description: '[item3] 단일 VM 전용 — per-index 네이밍이 없어 2 이상이면 이름 충돌/RWO PVC 공유 발생. 기본 1 고정(숨김).'
    signpost: '[item3] 단일 VM 전용 — per-index 네이밍이 없어 2 이상이면 이름 충돌/RWO PVC 공유 발생. 기본 1 고정(숨김).'
    type:
      dataType: integer
      isMultiple: false
    default: 1
  image:
    label: VM Image
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getVMImage
      type: dynamic
      parameters: []
      isPageable: false
    constraints:
      required: true
  storageclass:
    label: OS Disk Storage Class
    type:
      dataType: string
      isMultiple: false
    valueList:
      id: /data/vro-actions/com.vmk.dk/getStorageClass
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    constraints:
      required: true
  enableOsDiskResize:
    label: Enable OS Disk Resize
    description: 체크 시 OS 디스크 용량을 osDiskSize 값으로 확장합니다.
    signpost: 체크 시 OS 디스크 용량을 osDiskSize 값으로 확장합니다.
    type:
      dataType: boolean
      isMultiple: false
    default: false
  osDiskSize:
    label: OS Disk Size
    description: 'Enable OS Disk Resize=true일 때 적용되는 OS 디스크 용량입니다. 예: 40Gi'
    signpost: 'Enable OS Disk Resize=true일 때 적용되는 OS 디스크 용량입니다. 예: 40Gi'
    type:
      dataType: string
      isMultiple: false
    default: 40Gi
    constraints:
      required: false
  useCommonDataStorageclass:
    label: Use Common Data Disk Storage Class (공통 사용)
    type:
      dataType: boolean
      isMultiple: false
    default: true
  commonDataStorageclass:
    label: Common Data Disk Storage Class
    description: 공통 사용 시 모든 데이터 디스크에 적용됩니다. 비워두면 OS Disk Storage Class 값을 사용합니다.
    signpost: 공통 사용 시 모든 데이터 디스크에 적용됩니다. 비워두면 OS Disk Storage Class 값을 사용합니다.
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getStorageClassOptional
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    constraints:
      required: false
  dataStorageclass:
    label: Data Disk 1 Storage Class
    description: 개별 사용 시 Disk 1에 적용됩니다. 비워두면 OS Disk Storage Class 값을 사용합니다.
    signpost: 개별 사용 시 Disk 1에 적용됩니다. 비워두면 OS Disk Storage Class 값을 사용합니다.
    type:
      dataType: string
      isMultiple: false
    default: ''
    valueList:
      id: /data/vro-actions/com.vmk.dk/getStorageClassOptional
      type: dynamic
      parameters:
        - $type:
            dataType: string
            isMultiple: false
          ProjectName: projects
        - $type:
            dataType: string
            isMultiple: false
          NamespaceName: namespace
    constraints:
      required: false
  dataDiskCount:
    label: Data Disk Count
    description: 0이면 데이터 디스크를 생성하지 않습니다. 단순 템플릿으로 고정하려면 dataDisk 관련 입력/리소스를 함께 제거하세요.
    signpost: 0이면 데이터 디스크를 생성하지 않습니다. 단순 템플릿으로 고정하려면 dataDisk 관련 입력/리소스를 함께 제거하세요.
    type:
      dataType: integer
      isMultiple: false
    default: 0
    valueList:
      - value: 0
        label: '0'
      - value: 1
        label: '1'
      - value: 2
        label: '2'
      - value: 3
        label: '3'
      - value: 4
        label: '4'
  dataDiskLayout:
    label: Data Disk Layout
