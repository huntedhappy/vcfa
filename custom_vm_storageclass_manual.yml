layout:
  pages:
    - id: page_general
      sections:
        - id: 1. Environment (환경 설정)
          fields:
            - id: projects
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: namespace
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: 2. Compute Spec (컴퓨팅 사양)
          fields:
            - id: vmclass
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: image
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
        - id: 3. Network Settings (네트워크 설정)
          fields:
            - id: hostname
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: domainname
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: dnsservers
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: searchdomains
              display: textField
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
      title: 1. 기본 설정
    - id: page_storage
      sections:
        - id: 4. Storage Settings (공통)
          fields:
            - id: storageclass
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskCount
              display: dropDown
              state:
                visible: true
                read-only: false
              signpostPosition: right-middle
            - id: useCommonDataStorageclass
              display: checkbox
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskLayout
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: commonDataStorageclass
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      useCommonDataStorageclass: true
                    value: true
                  - equals:
                      useCommonDataStorageclass: false
                    value: false
                read-only: false
              signpostPosition: right-middle
        - id: 4-1. Data Disk 1
          fields:
            - id: dataStorageclass
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      useCommonDataStorageclass: true
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskSize
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: mountPoint
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: fsType
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: true
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
        - id: 4-2. Data Disk 2
          fields:
            - id: dataStorageclass2
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      useCommonDataStorageclass: true
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskSize2
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: mountPoint2
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      dataDiskLayout: merged
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: fsType2
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: true
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      dataDiskLayout: merged
                    value: false
                read-only: false
              signpostPosition: right-middle
        - id: 4-3. Data Disk 3
          fields:
            - id: dataStorageclass3
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      useCommonDataStorageclass: true
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskSize3
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: mountPoint3
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      dataDiskLayout: merged
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: fsType3
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: true
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      dataDiskLayout: merged
                    value: false
                read-only: false
              signpostPosition: right-middle
        - id: 4-4. Data Disk 4
          fields:
            - id: dataStorageclass4
              display: dropDown
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: false
                  - equals:
                      dataDiskCount: 4
                    value: true
                  - equals:
                      useCommonDataStorageclass: true
                    value: false
                read-only: false
              signpostPosition: right-middle
            - id: dataDiskSize4
              display: textField
              state:
                visible:
                  - equals:
                      dataDiskCount: 0
                    value: false
                  - equals:
                      dataDiskCount: 1
                    value: false
                  - equals:
                      dataDiskCount: 2
                    value: false
                  - equals:
                      dataDiskCount: 3
                    value: false
                  - equals:
                      dataDiskCount: 4
                    value: true
                read-only: false
              signpostPosition: right-middle
            - id: mountPoint4
              display: textField
              state:
                visible:
